<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Teater Lingkar FIB UB — Pentas Generasi 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #C2006E;
      background-image:
        radial-gradient(ellipse at 10% 10%, rgba(255,237,0,0.18) 0%, transparent 45%),
        radial-gradient(ellipse at 90% 90%, rgba(255,0,153,0.25) 0%, transparent 45%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      color: #FFF0F7;
      padding: 40px 20px;
    }

    .wrapper {
      width: 100%;
      max-width: 420px;
      text-align: center;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-wrap {
      width: 100%;
      border-radius: 4px;
      overflow: hidden;
      border: 3px solid #FF0099;
      box-shadow: 0 0 0 6px rgba(255,0,153,0.2);
      margin-bottom: 28px;
    }

    .logo-wrap img {
      width: 100%;
      height: auto;
      display: block;
    }

    .tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #FFED00;
      border: 1.5px solid rgba(255,237,0,0.5);
      background: rgba(255,237,0,0.08);
      padding: 5px 14px;
      border-radius: 2px;
      margin-bottom: 16px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(20px, 5vw, 28px);
      color: #FFED00;
      line-height: 1.2;
      margin-bottom: 10px;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
    }

    .subtitle {
      font-size: 13px;
      color: rgba(255,240,247,0.7);
      line-height: 1.6;
      margin-bottom: 32px;
    }

    /* Loading spinner shown while redirecting */
    .redirecting {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255,237,0,0.2);
      border-top-color: #FFED00;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .redirect-text {
      font-size: 13px;
      color: rgba(255,240,247,0.6);
      letter-spacing: 0.5px;
    }

    /* Manual button fallback */
    .manual-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 13px 28px;
      background: #FF0099;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 2px;
      box-shadow: 0 4px 0 #8B0057;
      transition: all 0.2s;
    }

    .manual-btn:hover {
      background: #FFED00;
      color: #6A003F;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
<div class="wrapper">

  <div class="logo-wrap">
    <img src="headertix.png" alt="Pentas Tunggal 2025 Teater Lingkar FIB UB" />
  </div>

  <div class="tag">🎭 Teater Lingkar FIB UB</div>
  <h1>"Pentas Generasi 2026:<br/>Merah"</h1>

  <div class="redirecting">
    <div class="spinner"></div>
    <div class="redirect-text" id="redirect-text">Penjualan tiket Pentas Generasi 2026 telah ditutup.</div>
    <a class="manual-btn" id="manual-btn" href="#" style="display:none;">
      Klik di sini →
    </a>
  </div>

</div>

<script>
  const REDIRECT_TO = "https://teaterlingkar.github.io/TiketMerah2026/";
  // Options:
  // Google Form:    "https://forms.gle/e38LuiHDfECrey1b8"
  // Ticketing page: "https://teaterlingkar.github.io/TiketMerah2026/"
  // ================================================

  const btn = document.getElementById('manual-btn');
  btn.href  = REDIRECT_TO;

  setTimeout(() => {
    window.location.href = REDIRECT_TO;
  }, 10000);

  // Show manual button after 10 seconds in case auto-redirect fails
  setTimeout(() => {
    document.getElementById('redirect-text').textContent = 'Tap tombol di bawah jika tidak dialihkan otomatis:';
    btn.style.display = 'inline-block';
  }, 10000);
</script>
</body>
</html>
